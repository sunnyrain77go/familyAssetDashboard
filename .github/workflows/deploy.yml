name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        run: |
          npm install
          npm run build
        env:
          VITE_GS_API_KEY: ${{ secrets.VITE_GS_API_KEY }}
          VITE_GS_SHEET_ID: ${{ secrets.VITE_GS_SHEET_ID }}
          VITE_GS_RANGE: ${{ secrets.VITE_GS_RANGE }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Vite build output directory
